name: CI

on:
  push:
    branches: [main, "issue_*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm test

  trigger-deploy:
    name: Trigger Staging Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger staging deploy
        run: |
          gh workflow run deploy-staging.yml \
            --repo nurulizyansyaza/courier-service \
            --ref staging \
            -f deploy_target=all
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_TRIGGER_TOKEN }}
